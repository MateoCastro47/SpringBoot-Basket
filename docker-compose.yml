services:
  mysql:
    image: mysql:8
    container_name: mysql-basket
    environment:
      MYSQL_ROOT_PASSWORD: MCS_47_2006
      MYSQL_DATABASE: apiBasket
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pMCS_47_2006"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: springboot-basket
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/apiBasket?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: MCS_47_2006
    depends_on:
      mysql:
        condition: service_healthy